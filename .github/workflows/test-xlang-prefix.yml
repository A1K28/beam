name: CI – TestXLang_Prefix

on:
  push:
    # adjust paths if you want to limit when it runs
    paths:
      - '.github/workflows/test-xlang-prefix.yml'

jobs:
  go-xlang-prefix:
    name: Run Go XLang Prefix Test
    runs-on: [self-hosted, linux]

    env:
      GCP_PROJECT: apache-beam-testing
      GCP_REGION: us-central1
      # Where we’ll stage expansion‐service logs/etc.
      EXP_DIR: $RUNNER_TEMP/expansion-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate to GCP (for Dataflow)
      - name: Prepare gcloud
        run: |
          curl -sSL https://sdk.cloud.google.com | bash
          echo "$HOME/google-cloud-sdk/bin" >> $GITHUB_PATH
          gcloud --quiet auth activate-service-account --key-file <(echo "${{ secrets.GCP_SA_KEY }}")
          gcloud config set project $GCP_PROJECT

      # 1) Build just the expansion service JAR
      - name: Build Java expansion‐service
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - name: Run Gradle for expansion‐service only
        run: |
          ./gradlew \
            :sdks:java:io:expansion-service:shadowJar \
            --no-daemon \
            --quiet

      # 2) Launch expansion service in background
      - name: Start expansion‐service
        run: |
          mkdir -p "$EXP_DIR"
          nohup java -jar \
            sdks/java/io/expansion-service/build/libs/beam-sdks-java-io-expansion-service-*.jar \
            --port=8099 \
            > "$EXP_DIR/out.log" 2>&1 &

      # 3) Run Go integration test directly
      - name: Run TestXLang_Prefix
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Invoke Go test
        working-directory: sdks/go/test
        run: |
          # point at our local expansion service, let Dataflow pick its SDK harness from the public repo
          go test . \
            -timeout 3h \
            -v \
            -run ^TestXLang_Prefix$ \
            -- \
            --runner=dataflow \
            --project=$GCP_PROJECT \
            --region=$GCP_REGION \
            --environment_type=DOCKER \
            --environment_config=us.gcr.io/apache-beam-testing/beam-sdk/java:latest \
            --expansion_addr=localhost:8099 \
            --staging_location=gs://temp-storage-for-end-to-end-tests/staging \
            --temp_location=gs://temp-storage-for-end-to-end-tests/temp
