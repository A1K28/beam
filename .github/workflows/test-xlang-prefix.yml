name: CI – TestXLang_Prefix

on:
  push:
    # adjust paths if you want to limit when it runs
    paths:
      - '.github/workflows/test-xlang-prefix.yml'

jobs:
  test-xlang-prefix:
    name: Run TestXLang_Prefix
    runs-on: [self-hosted, linux]

    env:
      # replace with your GCP project if needed
      GCP_PROJECT: apache-beam-testing
      # if you need authentication, set this secret up in your repo
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      USER: github-actions
      PROJECT: apache-beam-testing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- Prepare gcloud config dir ----
      - name: Prepare gcloud config dir
        run: |
          CFG="$RUNNER_TEMP/gcloud"
          mkdir -p "$CFG/logs"
          echo "CLOUDSDK_CONFIG=$CFG" >> "$GITHUB_ENV"

        # ---- gcloud auth ----
      - name: Install gcloud CLI
        run: |
          mkdir -p "$CLOUDSDK_CONFIG/logs"
          curl -sSL https://sdk.cloud.google.com | bash
          echo "$HOME/google-cloud-sdk/bin" >> $GITHUB_PATH
          source "$HOME/google-cloud-sdk/path.bash.inc"
          gcloud --version

      - name: gcloud auth (service account) + docker login
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > "$HOME/sa.json"
          gcloud auth activate-service-account --key-file="$HOME/sa.json"
          gcloud config set project $PROJECT
          # === Add this ===
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/sa.json" >> "$GITHUB_ENV"
          # ================
          
          # your existing docker login bits…
          gcloud auth configure-docker us.gcr.io -q
          echo '${{ secrets.GCP_SA_KEY }}' \
            | docker login -u _json_key --password-stdin https://us.gcr.io

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - name: Add JAVA_HOME to PATH
        run: |
          echo "${{ steps.setup-java.outputs.path }}/bin" >> $GITHUB_PATH
          echo "JAVA_HOME=${{ steps.setup-java.outputs.path }}" >> $GITHUB_ENV

      - name: Set up Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      # 1) Build just the expansion service JAR
      - name: Build Java expansion‐service
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - name: Run Gradle for expansion‐service only
        run: |
          ./gradlew \
            :sdks:java:io:expansion-service:shadowJar \
            --no-daemon \
            --quiet

      # 2) Launch expansion service in background
      - name: Start expansion‑service
        run: |
          mkdir -p "$RUNNER_TEMP/expansion-service"
          nohup java -jar \
            sdks/java/io/expansion-service/build/libs/beam-sdks-java-io-expansion-service-*.jar \
            --port=8099 \
            > "$RUNNER_TEMP/expansion-service/out.log" 2>&1 &

      - name: Run Go XLang Prefix test
        working-directory: sdks/go
        run: |
          go mod download
          go test ./test/integration/xlang \
            -timeout 3h \
            -v \
            -run ^TestXLang_Prefix$ \
            -- \
              --runner=dataflow \
              --project="${GCP_PROJECT}" \
              --region="${GCP_REGION}" \
              --environment_type=DOCKER \
              --environment_config=us.gcr.io/apache-beam-testing/beam-sdk/java:latest \
              --expansion_addr=test:localhost:8099 \
              --staging_location=gs://temp-storage-for-end-to-end-tests/staging \
              --temp_location=gs://temp-storage-for-end-to-end-tests/temp
