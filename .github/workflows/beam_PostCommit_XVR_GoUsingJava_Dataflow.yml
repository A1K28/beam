# TODO(https://github.com/apache/beam/issues/32492): re-enable the suite
# on cron and add release/trigger_all_tests.json to trigger path once fixed.

name: PostCommit XVR GoUsingJava Dataflow (DISABLED)

on:
  # schedule:
  #  - cron: '45 5/6 * * *'
  pull_request_target:
    paths: ['.github/trigger_files/beam_PostCommit_XVR_GoUsingJava_Dataflow.json']
  workflow_dispatch:

permissions:
  actions: write
  pull-requests: write
  checks: write
  contents: read
  deployments: read
  id-token: none
  issues: write
  discussions: read
  packages: read
  pages: read
  repository-projects: read
  security-events: read
  statuses: read

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.issue.number || github.sha || github.head_ref || github.ref }}-${{ github.event.schedule || github.event.comment.id || github.event.sender.login }}'
  cancel-in-progress: true

env:
  DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
  GRADLE_ENTERPRISE_CACHE_USERNAME: ${{ secrets.GE_CACHE_USERNAME }}
  GRADLE_ENTERPRISE_CACHE_PASSWORD: ${{ secrets.GE_CACHE_PASSWORD }}

jobs:
  beam_PostCommit_XVR_GoUsingJava_Dataflow:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'schedule' && github.repository == 'apache/beam') ||
      github.event.comment.body == 'Run XVR_GoUsingJava_Dataflow PostCommit'
    runs-on: [self-hosted, ubuntu-20.04, main]
    timeout-minutes: 300
    name: ${{ matrix.job_name }} (${{ matrix.job_phrase }})
    strategy:
      matrix:
        job_name: ["beam_PostCommit_XVR_GoUsingJava_Dataflow"]
        job_phrase: ["Run XVR_GoUsingJava Dataflow PostCommit"]

    env:
      USER: github-actions
      PROJECT: apache-beam-testing
      GO_SDK_IMG: ""   # will be set after build

    steps:
      - uses: actions/checkout@v4

      # ---- Make the Go validatesrunner script visible & patch out multi-arch/push/build/tag ----
      - name: Expose & patch Go test script
        run: |
          cp sdks/go/test/run_validatesrunner_tests.sh ./run_validatesrunner_tests.sh
          chmod +x ./run_validatesrunner_tests.sh
          # Remove flags your Docker 20.10 doesn't support
          sed -i 's/-Pcontainer-architecture-list=[^ ]*//g' ./run_validatesrunner_tests.sh
          sed -i 's/-Ppush-containers//g' ./run_validatesrunner_tests.sh
          # Strip any internal build/tag/push logic so we control the image
          sed -i '/GO_SDK_IMAGE=/d' ./run_validatesrunner_tests.sh
          sed -i '/docker build/d' ./run_validatesrunner_tests.sh
          sed -i '/docker push/d' ./run_validatesrunner_tests.sh

      # ---- Prepare gcloud config dir ----
      - name: Prepare gcloud config dir
        run: |
          CFG="$RUNNER_TEMP/gcloud"
          mkdir -p "$CFG/logs"
          echo "CLOUDSDK_CONFIG=$CFG" >> "$GITHUB_ENV"

      # ---- Java before any Gradle ----
      - name: Set up Java 11
        id: jdk
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: gradle

      - name: Ensure JAVA_HOME/bin on PATH
        run: |
          echo "${{ steps.jdk.outputs.path }}/bin" >> "$GITHUB_PATH"
          echo "JAVA_HOME=${{ steps.jdk.outputs.path }}" >> "$GITHUB_ENV"
          which java && java -version
      - name: Setup repository
        uses: ./.github/actions/setup-action
        with:
          comment_phrase: ${{ matrix.job_phrase }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_job: ${{ matrix.job_name }} (${{ matrix.job_phrase }})

      - name: Setup environment
        uses: ./.github/actions/setup-environment-action
        with:
          python-version: default

      - name: Set up Docker Buildx (optional)
        uses: docker/setup-buildx-action@v3

      # ---- gcloud auth ----
      - name: Install gcloud CLI
        run: |
          mkdir -p "$CLOUDSDK_CONFIG/logs"
          curl -sSL https://sdk.cloud.google.com | bash
          echo "$HOME/google-cloud-sdk/bin" >> $GITHUB_PATH
          source "$HOME/google-cloud-sdk/path.bash.inc"
          gcloud --version
      - name: gcloud auth (service account) + docker login
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > "$HOME/sa.json"
          gcloud auth activate-service-account --key-file="$HOME/sa.json"
          gcloud config set project $PROJECT
          # === Add this ===
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/sa.json" >> "$GITHUB_ENV"
          # ================
          
          # your existing docker login bits…
          gcloud auth configure-docker us.gcr.io -q
          echo '${{ secrets.GCP_SA_KEY }}' \
            | docker login -u _json_key --password-stdin https://us.gcr.io

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      # ---- Run the Gradle task (full suite) ----
      - name: Run XVR GoUsingJava Dataflow task
        env:
          CLOUDSDK_CONFIG: ${{ env.CLOUDSDK_CONFIG }}
          GO_SDK_IMG: ${{ env.GO_SDK_IMG }}
        uses: ./.github/actions/gradle-command-self-hosted-action
        with:
          gradle-command: >
            :runners:google-cloud-dataflow-java:validatesCrossLanguageRunnerGoUsingJava
            -PdockerImageRoot=gcr.io/apache-beam-testing/beam-sdk
            -Ptest_filter=TestXLang_Prefix
            --info --stacktrace

      - name: Publish JUnit Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          commit: '${{ env.prsha || env.GITHUB_SHA }}'
          comment_mode: ${{ github.event_name == 'issue_comment'  && 'always' || 'off' }}
          files: '**/build/test-results/**/*.xml'
          large_files: true