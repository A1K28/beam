name: CI – TestXLang_Prefix

on:
  push:
    # adjust paths if you want to limit when it runs
    paths:
      - '.github/workflows/test-xlang-prefix.yml'

jobs:
  test-xlang-prefix:
    name: Run TestXLang_Prefix
    runs-on: [self-hosted, linux]

    env:
      # replace with your GCP project if needed
      GCP_PROJECT: apache-beam-testing
      # if you need authentication, set this secret up in your repo
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        if: env.GCP_SA_KEY != ''
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ env.GCP_SA_KEY }}'
      - name: Configure gcloud project
        if: env.GCP_SA_KEY != ''
        run: gcloud config set project "${GCP_PROJECT}"

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - name: Add JAVA_HOME to PATH
        run: |
          echo "${{ steps.setup-java.outputs.path }}/bin" >> $GITHUB_PATH
          echo "JAVA_HOME=${{ steps.setup-java.outputs.path }}" >> $GITHUB_ENV

      - name: Set up Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run only TestXLang_Prefix
        run: |
          ./gradlew \
            :runners:google-cloud-dataflow-java:validatesCrossLanguageRunnerGoUsingJava \
            -Ptest_filter=TestXLang_Prefix \
            -PdockerImageRoot=gcr.io/apache-beam-testing/beam-sdk \
            --info --stacktrace
